<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#12081f">
<title>WORLD TELIO &amp; MARLON — Accueil</title>
<style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;padding:0;min-height:100%}
    body{
        font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
        background:radial-gradient(circle at 50% 0%,#3a1a5c 0%,#1a0b2e 45%,#0d0518 100%);
        color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;
        min-height:100vh;min-height:100dvh;padding:26px 18px;text-align:center;overflow-x:hidden;
    }
    .stars{position:fixed;inset:0;pointer-events:none;z-index:0}
    .stars i{position:absolute;background:#fff;border-radius:50%;opacity:.7;animation:tw 3s infinite ease-in-out}
    @keyframes tw{0%,100%{opacity:.15;transform:scale(.7)}50%{opacity:.9;transform:scale(1.2)}}
    .wrap{position:relative;z-index:1;width:100%;max-width:560px}
    .emo{font-size:clamp(1.8rem,8vw,2.8rem);letter-spacing:.12em;margin-bottom:6px}
    h1{
        font-size:clamp(1.9rem,8.5vw,3.2rem);line-height:1.05;margin:.1em 0 .25em;font-weight:900;
        background:linear-gradient(180deg,#ffe9a8,#ffb43b 55%,#ff7a2d);
        -webkit-background-clip:text;background-clip:text;color:transparent;
        filter:drop-shadow(0 3px 0 rgba(0,0,0,.35));
    }
    .sub{font-size:clamp(.95rem,3.6vw,1.1rem);opacity:.9;font-weight:600;margin-bottom:26px;line-height:1.5}
    .games{display:flex;flex-direction:column;gap:16px}
    a.card{
        display:flex;align-items:center;gap:14px;text-align:left;text-decoration:none;color:#fff;
        padding:18px 20px;border-radius:22px;border:2px solid rgba(255,255,255,.18);
        background:linear-gradient(145deg,rgba(255,255,255,.13),rgba(255,255,255,.05));
        box-shadow:0 10px 30px rgba(0,0,0,.4);backdrop-filter:blur(6px);
        transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease;
    }
    a.card:active{transform:scale(.97)}
    @media(hover:hover){a.card:hover{transform:translateY(-4px);border-color:rgba(255,210,59,.75);box-shadow:0 16px 38px rgba(0,0,0,.5)}}
    a.card .ic{font-size:2.6rem;flex:0 0 auto;filter:drop-shadow(0 2px 4px rgba(0,0,0,.4))}
    a.card .nm{font-size:1.22rem;font-weight:900;display:block;margin-bottom:3px}
    a.card .dc{font-size:.86rem;opacity:.85;font-weight:600;line-height:1.35;display:block}
    .foot{margin-top:30px;font-size:.8rem;opacity:.55;font-weight:600}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="wrap">
    <div class="emo">🎠 ✨ 🔐</div>
    <h1>WORLD<br>TELIO &amp; MARLON</h1>
    <div class="sub">Choisis ton aventure !</div>

    <div class="games">
        <a class="card" href="enquete.html">
            <span class="ic">🎠</span>
            <span>
                <span class="nm">LA FÊTE FORAINE</span>
                <span class="dc">Énigmes, blind-test, jeux de mots et grande enquête : des dizaines de défis à relever.</span>
            </span>
        </a>
        <a class="card" href="escape3d.html">
            <span class="ic">🔐</span>
            <span>
                <span class="nm">ESCAPE 3D</span>
                <span class="dc">6 salles en 3D à explorer : bureau, chambre, voiture, cuisine, grenier et station spatiale.</span>
            </span>
        </a>
    </div>

    <div class="foot">Fait avec ❤️ pour Telio &amp; Marlon</div>
</div>
<script>
(function(){
    const box = document.getElementById('stars');
    let html = '';
    for (let i = 0; i < 60; i++) {
        const s = (Math.random() * 2.4 + 0.8).toFixed(1);
        html += '<i style="left:' + (Math.random()*100).toFixed(2) + '%;top:' + (Math.random()*100).toFixed(2) +
                '%;width:' + s + 'px;height:' + s + 'px;animation-delay:' + (Math.random()*3).toFixed(2) + 's"></i>';
    }
    box.innerHTML = html;
})();
</script>
</body>
</html>
